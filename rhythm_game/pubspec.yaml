name: rhythm_game
description: A high-quality rhythm game built with Flutter and Flame engine.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flame: ^1.18.0
  flame_audio: ^2.10.2
  audioplayers: ^6.0.0
  provider: ^6.1.2
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2

flutter:
  uses-material-design: true
  
  assets:
    - assets/music/
    - assets/images/
    - assets/sounds/
    - assets/sfx/
